version: "3.9"

services:
  musicstore:
    container_name: musicstore
    build:
      context: ./MusicStore
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__LookupDb: "Data Source=/data/musicstore.lookup.db"
    volumes:
      - musicstore_data:/data
    restart: unless-stopped

volumes:
  musicstore_data:
